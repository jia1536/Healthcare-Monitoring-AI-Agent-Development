<svg width="680" height="900" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect width="680" height="900" fill="#ffffff"/>

<circle cx="340" cy="40" r="26" fill="#1a1a1a"/>
<text x="340" y="45" text-anchor="middle" fill="#fff" font-size="12">START</text>
<line x1="340" y1="66" x2="340" y2="100" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="220" y="100" width="240" height="50" rx="8" fill="#f2f0ff" stroke="#7f77dd" stroke-width="1"/>
<text x="340" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">Input state</text>
<text x="340" y="138" text-anchor="middle" font-size="11" fill="#534ab7">User health question</text>
<line x1="340" y1="150" x2="340" y2="184" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="40" y="184" width="600" height="560" rx="16" fill="none" stroke="#ccc" stroke-width="1"/>
<text x="60" y="204" font-size="12" fill="#666">LangGraph orchestration</text>

<rect x="220" y="220" width="240" height="50" rx="8" fill="#e6f1fb" stroke="#378ade" stroke-width="1"/>
<text x="340" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#042c53">medical_info</text>
<text x="340" y="258" text-anchor="middle" font-size="11" fill="#185fa5">Runs agent_node (Groq LLM)</text>
<line x1="340" y1="270" x2="340" y2="304" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

<polygon points="340,304 430,370 340,436 250,370" fill="#eeedfe" stroke="#7f77dd" stroke-width="1"/>
<text x="340" y="364" text-anchor="middle" font-size="11" fill="#26215c">route_medical_info()</text>
<text x="340" y="382" text-anchor="middle" font-size="11" fill="#26215c">check tool_calls</text>

<line x1="250" y1="370" x2="140" y2="370" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
<text x="195" y="360" text-anchor="middle" font-size="11" fill="#666">tool calls</text>

<rect x="20" y="396" width="240" height="50" rx="8" fill="#e6f1fb" stroke="#378ade" stroke-width="1"/>
<text x="140" y="416" text-anchor="middle" font-size="13" font-weight="600" fill="#042c53">medical_tools</text>
<text x="140" y="434" text-anchor="middle" font-size="11" fill="#185fa5">Runs ToolNode</text>
<line x1="140" y1="446" x2="140" y2="480" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="20" y="480" width="240" height="50" rx="8" fill="#f2f2f2" stroke="#999" stroke-width="1"/>
<text x="140" y="500" text-anchor="middle" font-size="13" font-weight="600" fill="#222">search_health_documents</text>
<text x="140" y="518" text-anchor="middle" font-size="11" fill="#555">RAG retrieval, local docs</text>
<line x1="140" y1="530" x2="140" y2="564" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="20" y="564" width="240" height="50" rx="8" fill="#f2f2f2" stroke="#999" stroke-width="1"/>
<text x="140" y="584" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Append ToolMessage</text>
<text x="140" y="602" text-anchor="middle" font-size="11" fill="#555">Add result to state</text>

<path d="M140 614 L140 660 L220 660 L220 245" fill="none" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
<text x="150" y="654" font-size="11" fill="#666">loop back</text>

<line x1="430" y1="370" x2="540" y2="370" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
<text x="485" y="360" text-anchor="middle" font-size="11" fill="#666">final answer</text>

<rect x="500" y="396" width="140" height="50" rx="8" fill="#f2f2f2" stroke="#999" stroke-width="1"/>
<text x="570" y="416" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Save to</text>
<text x="570" y="434" text-anchor="middle" font-size="11" fill="#555">health_report</text>

<line x1="570" y1="446" x2="570" y2="720" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
<circle cx="570" cy="746" r="26" fill="#1a1a1a"/>
<text x="570" y="751" text-anchor="middle" fill="#fff" font-size="12">END</text>
</svg>
